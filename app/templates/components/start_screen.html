<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-dark-green-900">
    <div class="text-center max-w-sm">
        <h1 class="text-4xl font-bold text-orange-50 mb-2">Soc Ops</h1>
        <p class="text-lg text-orange-200 mb-8">Social Bingo</p>

        <div class="bg-orange-50 rounded-lg p-6 shadow-sm border border-orange-200 mb-8">
            <h2 class="font-semibold text-dark-green-900 mb-3">How to play</h2>
            <ul class="text-left text-dark-green-700 text-sm space-y-2">
                <li>• Find people who match the questions</li>
                <li>• Tap a square when you find a match</li>
                <li>• Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-orange-500 text-white font-semibold py-4 px-8 rounded-lg text-lg active:bg-orange-600 transition-colors">
            Start Game
        </button>
    </div>
</div>
</div>
